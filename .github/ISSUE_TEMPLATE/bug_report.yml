name: Bug report
description: Report a defect in @chainvue/verus-sapling
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. **This library signs money.** Please do **NOT** paste
        spending keys, viewing keys, seed phrases, `.params` files, or any mainnet
        secret. Redact addresses/txids if they are sensitive. For a *security
        vulnerability*, do not open a public issue — see
        [SECURITY.md](../blob/main/SECURITY.md).
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: dropdown
    id: flow
    attributes:
      label: Which flow?
      multiple: true
      options:
        - t→z (shielding)
        - z→z (shielded → shielded)
        - z→t (shielded → transparent)
        - note detection / scanning
        - lightwalletd transport (Node)
        - lightwalletd transport (browser / gRPC-web)
        - other / not sure
    validations:
      required: true
  - type: dropdown
    id: env
    attributes:
      label: Environment
      options:
        - Node.js
        - Browser (bundler)
        - Browser extension (MV3)
        - other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Package version
      placeholder: "e.g. 0.1.0 (or a git SHA)"
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Minimal steps or a code snippet. A daemon `decoderawtransaction` / rejection message is gold.
      render: shell
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Node version, network (testnet/mainnet), lightwalletd version, stack traces (redacted).
    validations:
      required: false
