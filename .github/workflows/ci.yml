# CI — install, build, typecheck, test on every push and PR.
#
# Notes:
# - This is the PR gate. release.yml runs the same TS gate on push to main
#   (before publishing); the overlap on main is intentional and cheap.
# - No lint step: this package has no eslint config (unlike verus-sdk); the
#   runnable gate is tsc build -> tsc --noEmit -> vitest, plus the Rust crate's
#   `cargo test` (its own job).
# - Node matrix: runtime floor is Node 18 (engines), but the test toolchain and
#   OIDC publishing want newer; 20/22/24 are exercised here.
name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ts:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        node-version: [20, 22, 24]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v5

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

  crate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v5

      # SHA-pinned (tag-hijack defense). dtolnay/rust-toolchain selects the
      # toolchain from the ref name, so a SHA pin needs an explicit `toolchain`.
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: stable

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: crate

      # Param-free regression net for the ZIP-243 sighash / v4 serializer.
      - name: cargo test
        working-directory: crate
        run: cargo test

  # The published WASM prover (crate/pkg) is committed. Rebuild it from source and
  # fail if it drifts — that binary is the signer/serializer, the most
  # security-critical artifact in the package. NOTE: byte-reproducibility depends
  # on the wasm-pack + rustc versions matching those that built the committed pkg;
  # if a toolchain bump causes a benign diff, rebuild and commit crate/pkg.
  wasm-drift:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v5

      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: crate

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Rebuild WASM and check for drift vs the committed crate/pkg
        run: |
          wasm-pack build crate --target web --release
          if ! git diff --exit-code -- crate/pkg; then
            echo "::error::crate/pkg is out of sync with crate/src. Rebuild with 'wasm-pack build crate --target web --release' and commit the result."
            exit 1
          fi
